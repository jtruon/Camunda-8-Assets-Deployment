jobs:
  deploy-workflows:
    runs-on: [self-hosted, camunda-rock-dev]  # <— uses your Mac

    env:
      # You can now talk to your local cluster exactly like you do in a terminal
      CAMUNDA_BASE_URL: camunda.example.com
      CAMUNDA_AUTH_STRATEGY: OAUTH
      CAMUNDA_CLIENT_ID: ${{ secrets.CAMUNDA_CLIENT_ID }}
      CAMUNDA_CLIENT_SECRET: ${{ secrets.CAMUNDA_CLIENT_SECRET }}
      CAMUNDA_OAUTH_URL: ${{ secrets.CAMUNDA_OAUTH_URL }}
      CAMUNDA_TOKEN_AUDIENCE: orchestration-api

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install c8ctl
        run: npm install -g @camunda8/cli

      - name: Deploy all workflows with c8ctl
        run: |
          echo "Deploying to environment=${{ vars.ENVIRONMENT }}, cluster=${{ vars.CLUSTER_NAME }}, region=${{ vars.REGION }}"
          c8ctl deploy bpmn dmn forms